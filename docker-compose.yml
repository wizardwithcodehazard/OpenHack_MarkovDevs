services:
  ccpa-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: sahilrane/ccpa-compliance:latest
    container_name: ccpa-compliance-api
    ports:
      - "8000:8000"
    
    # ⚠️ GPU SUPPORT: Commented out for local CPU testing. 
    # If deploying on a cloud GPU, uncomment the lines below.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
            
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: on-failure